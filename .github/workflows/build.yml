name: Build for Linux ARM64
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt update && sudo apt install -y libwebkit2gtk-4.1-dev build-essential curl wget libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - run: rustup target add aarch64-unknown-linux-gnu
      - run: npm install
      - run: npm run tauri build -- --target aarch64-unknown-linux-gnu
      - uses: actions/upload-artifact@v4
        with:
          name: linux-arm64-bundle
          path: src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/