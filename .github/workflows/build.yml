name: Build for Linux ARM64
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Add ARM64 target
        run: rustup target add aarch64-unknown-linux-gnu

      - name: Install Tauri Linux Dependencies (Host only)
        run: |
          sudo apt update
          sudo apt install -y libwebkit2gtk-4.1-dev build-essential curl wget libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install Frontend Dependencies
        run: npm install

      # 关键步骤：先用 cross 编译 Rust 后端
      - name: Build Rust backend with cross
        run: |
          cd src-tauri
          cross build --release --target aarch64-unknown-linux-gnu
        env:
          # 允许 pkg-config 交叉查找，实际上 bundled SQLite 不再需要
          PKG_CONFIG_ALLOW_CROSS: 1

      # 然后使用 Tauri 打包（它会跳过 Rust 编译，因为已经编译好了）
      - name: Build Tauri App Bundle
        run: npm run tauri build -- --target aarch64-unknown-linux-gnu --no-bundle
        env:
          # 告诉 Tauri 跳过 Rust 编译
          TAURI_BUILD_SKIP_RUST: true
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64-bundle
          path: src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/