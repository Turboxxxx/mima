name: Build for Linux ARM64
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install Frontend Dependencies
        run: npm install

      - name: Build Tauri App for ARM64
        run: |
          npm run tauri build -- --target aarch64-unknown-linux-gnu
        env:
          TAURI_BUILD_RUSTC: cross
          PKG_CONFIG_ALLOW_CROSS: 1
          # 关键：指定包含完整 GTK 依赖的 Docker 镜像
          CROSS_REMOTE_TARGET: aarch64-unknown-linux-gnu
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64-bundle
          path: src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/