name: Build for Linux ARM64
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install Tauri Linux Dependencies (host)
        run: |
          sudo apt update
          sudo apt install -y libwebkit2gtk-4.1-dev build-essential curl wget libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      # 👇 新增步骤：安装 ARM64 架构的 GTK 开发库
      - name: Install ARM64 GTK dependencies
        run: |
          sudo dpkg --add-architecture arm64
          sudo apt update
          sudo apt install -y libgtk-3-dev:arm64 libglib2.0-dev:arm64 libgdk-pixbuf2.0-dev:arm64 libwebkit2gtk-4.1-dev:arm64

      - name: Install Frontend Dependencies
        run: npm install

      - name: Build Tauri App for ARM64
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target aarch64-unknown-linux-gnu
          includeDeb: true
          includeAppImage: true

      - name: Upload Artifacts (fallback)
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64-bundle
          path: src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/